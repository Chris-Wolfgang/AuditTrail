name: OSSF Scorecard

# Automated security-posture scoring (OpenSSF Scorecard). Runs on a weekly
# schedule and on pushes to main, publishing results to the GitHub Security tab
# (SARIF) and to the public OpenSSF results store. Read-only; advisory only —
# this does not gate PRs.

on:
  branch_protection_rule:
  schedule:
    - cron: '24 5 * * 1'   # Mondays 05:24 UTC
  push:
    branches: [ main ]

# Top-level least privilege; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the OpenSSF store
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish so the repo earns an OpenSSF Scorecard badge and the score
          # is visible at https://securityscorecards.dev.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results.sarif
