name: Workflow security audit

# Lints the GitHub Actions workflows themselves for correctness (actionlint) and
# for workflow-level security issues — untrusted-input injection into run blocks,
# over-broad permissions, expression-context secret leaks (zizmor). Advisory:
# surfaces findings as annotations / in the Security tab; does not gate PRs.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: '30 4 * * 1'   # Mondays 04:30 UTC

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@01d2dd67e3525e5a0ce72e8fa38e5a3ab65e2ded # v1.72.1
        with:
          reporter: github-check
          level: warning
          fail_level: none   # advisory — report findings without failing the job

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install zizmor
        run: pipx install zizmor==1.26.1

      - name: Run zizmor
        # Non-gating: zizmor exits non-zero when it finds issues; we still want
        # the SARIF uploaded so findings show in the Security tab.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --format sarif . > zizmor.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor
